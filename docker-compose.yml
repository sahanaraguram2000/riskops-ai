services:
  riskops-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - LLM_PROVIDER=offline
    volumes:
      - ./data:/app/data

  riskops-api:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=offline
    volumes:
      - ./data:/app/data

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install mlflow>=2.14.0 && mlflow ui --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
